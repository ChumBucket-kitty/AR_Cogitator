<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor AR - Rack Grande</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        /* Forzamos que el cuerpo ocupe toda la pantalla sin scroll */
        :root, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background-color: #222; 
        }

        /* El visor DEBE ser absoluto para cubrir toda la pantalla */
        model-viewer {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Botón estilo "Call to Action" grande en la parte inferior */
        .ar-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 20px 40px;
            position: absolute;
            bottom: 50px; /* Separación del borde inferior */
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 9999; /* Asegura que esté por encima de todo */
            white-space: nowrap;
        }

        /* Estilo para cuando el botón es presionado */
        .ar-button:active {
            background-color: #0056b3;
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="rack_grande.gltf" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls 
        shadow-intensity="2" 
        environment-image="neutral"
        exposure="1"
        camera-target="0m 1m 0m"
        alt="Rack 1:1">
        
        <button slot="ar-button" class="ar-button">
            📦 VER EN TU PISO (REALIDAD VIRTUAL)
        </button>

        <div slot="poster" style="color: white; text-align: center; margin-top: 45vh;">
            Cargando modelo 3D...
        </div>

    </model-viewer>

</body>
</html>

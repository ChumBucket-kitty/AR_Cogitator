<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor AR - Rack Grande</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #e5e5e5; }
        
        /* Visor de pantalla completa */
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }

        /* Botón de AR mejorado para que sea imposible no verlo */
        .ar-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 36px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ar-button:active { background-color: #0056b3; }
    </style>
</head>
<body>

    <model-viewer 
        src="rack_grande.gltf" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1.5" 
        shadow-softness="1"
        environment-image="neutral" 
        auto-rotate
        camera-target="0m 1.05m 0m"
        alt="Modelo 3D Rack Grande">
        
        <button slot="ar-button" class="ar-button">
            <span>📦</span> VER EN TU ESPACIO REAL
        </button>

        <div slot="poster" style="display:flex; justify-content:center; align-items:center; height:100%;">
            <p>Cargando Rack de 2.13m...</p>
        </div>

    </model-viewer>

</body>
</html>

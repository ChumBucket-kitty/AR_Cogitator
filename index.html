<!DOCTYPE html>
<html lang="es">
<head>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #333; }
        
        .ar-button {
            background-color: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            border: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="rack_grande.gltf" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        ar-scale="fixed" 
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">
            📦 VER EN AR (ESCALA 1:1)
        </button>

    </model-viewer>

</body>
</html>
